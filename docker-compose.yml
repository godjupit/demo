services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: community-agent-postgres
    environment:
      POSTGRES_DB: community_agents
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  postgres_data:
